apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cmsapi-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://10.48.209.150/<your-group>/<your-subgroup>/<your-manifest-repo>.git
    targetRevision: main
    path: cmsapi/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
